name: TCF Bot — 24/7 Runner

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

concurrency:
  group: tcf-bot-runner
  cancel-in-progress: true

jobs:
  run:
    name: Run bot (~4.5 h)
    runs-on: ubuntu-latest
    timeout-minutes: 300
    permissions:
      contents: write

    services:
      mongodb:
        image: mongo:8.0
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt anthropic

      - name: Wait for MongoDB
        run: |
          for i in $(seq 1 30); do
            mongosh --quiet --eval "db.runCommand({ping:1})" > /dev/null 2>&1 && echo "MongoDB ready" && break
            sleep 2
          done

      - name: AI pre-flight — read project, understand, fix obvious issues
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python - << 'PYEOF'
          import anthropic, json, pathlib, sys

          SKIP = {".git", "__pycache__", ".pythonlibs", ".local", ".pytest_cache"}

          def collect(roots: list[str], exts=(".py", ".md", ".toml")) -> dict[str, str]:
              files: dict[str, str] = {}
              for root in roots:
                  for p in pathlib.Path(root).rglob("*"):
                      if not p.is_file() or p.suffix not in exts:
                          continue
                      if any(s in p.parts for s in SKIP):
                          continue
                      try:
                          files[str(p)] = p.read_text(errors="replace")
                      except OSError:
                          pass
              return files

          project = collect(["agents", "tcbot", "tests", "pyproject.toml"])
          ctx = "\n\n".join(f"=== {k} ===\n{v}" for k, v in sorted(project.items()))

          client = anthropic.Anthropic()
          resp = client.messages.create(
              model="claude-opus-4-5",
              max_tokens=4096,
              system=(
                  "You are a senior Python engineer doing a pre-flight check. "
                  "Read the entire TCF bot project. The agents/ folder has architecture docs "
                  "and coding rules — follow them exactly. tcbot/ is the main package. "
                  "After reading: (1) confirm understanding, (2) identify any import errors, "
                  "dead code, or rule violations. "
                  "Return ONLY valid JSON: {\"fixes\": {\"relative/path.py\": \"full corrected content\"}}. "
                  "If no fixes needed: {\"fixes\": {}}. No prose, no markdown fences."
              ),
              messages=[{
                  "role": "user",
                  "content": (
                      "Read and fully understand this project. Check agents/ docs, tcbot/ source, "
                      "tests/. Then return the JSON fix map for any issues you find.\n\n"
                      + ctx
                  ),
              }],
          )

          raw = resp.content[0].text.strip()
          try:
              data = json.loads(raw)
          except json.JSONDecodeError:
              print("AI returned non-JSON — skipping pre-flight fixes.", file=sys.stderr)
              sys.exit(0)

          fixes: dict[str, str] = data.get("fixes", {})
          for path_str, content in fixes.items():
              p = pathlib.Path(path_str)
              if p.exists() and str(p).startswith("tcbot/"):  # safety: only patch source
                  p.write_text(content)
                  print(f"Pre-flight patched: {p}")
          print(f"Pre-flight done — {len(fixes)} fix(es) applied.")
          PYEOF

      - name: Commit pre-flight fixes (if any)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tcbot/
          git diff --cached --quiet || git commit -m "fix: AI pre-flight patch [skip ci]"
          git diff --cached --quiet || git push

      - name: Run bot for 4.5 hours
        id: bot_run
        env:
          BOT_TOKEN:   ${{ secrets.BOT_TOKEN }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: |
          python -m tcbot > bot.log 2>&1 &
          BOT_PID=$!
          echo "BOT_PID=$BOT_PID" >> "$GITHUB_ENV"
          sleep 16200  # 4.5 h
          kill "$BOT_PID" 2>/dev/null || true
          wait "$BOT_PID" 2>/dev/null || true

      - name: Check for crash errors
        if: always()
        run: |
          if grep -qiE "(Traceback|Error:|CRITICAL)" bot.log 2>/dev/null; then
            echo "CRASH_DETECTED=true" >> "$GITHUB_ENV"
            tail -100 bot.log > crash_tail.log
          else
            echo "CRASH_DETECTED=false" >> "$GITHUB_ENV"
          fi

      - name: AI crash analysis and auto-fix
        if: always() && env.CRASH_DETECTED == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python - << 'PYEOF'
          import anthropic, json, pathlib, sys

          SKIP = {".git", "__pycache__", ".pythonlibs", ".local"}

          def collect(roots, exts=(".py", ".md", ".toml")):
              files = {}
              for root in roots:
                  for p in pathlib.Path(root).rglob("*"):
                      if not p.is_file() or p.suffix not in exts:
                          continue
                      if any(s in p.parts for s in SKIP):
                          continue
                      try:
                          files[str(p)] = p.read_text(errors="replace")
                      except OSError:
                          pass
              return files

          crash_log = pathlib.Path("crash_tail.log").read_text(errors="replace")
          project   = collect(["agents", "tcbot"])
          ctx = "\n\n".join(f"=== {k} ===\n{v}" for k, v in sorted(project.items()))

          client = anthropic.Anthropic()
          resp = client.messages.create(
              model="claude-opus-4-5",
              max_tokens=8192,
              system=(
                  "You are a senior Python engineer fixing a crashed Telegram bot. "
                  "The project is TCF bot — a federation moderation bot built with PTB 22.5, "
                  "Motor (async MongoDB), Flask keepalive. Entry point: python -m tcbot. "
                  "agents/ folder contains architecture docs and strict coding rules — obey them. "
                  "Analyse the crash log and fix the root cause. "
                  "Return ONLY valid JSON: {\"fixes\": {\"relative/path.py\": \"full corrected content\"}}. "
                  "Only include files that actually need changing. No prose, no fences."
              ),
              messages=[{
                  "role": "user",
                  "content": (
                      f"=== CRASH LOG (last 100 lines) ===\n{crash_log}\n\n"
                      f"=== PROJECT FILES ===\n{ctx}"
                  ),
              }],
          )

          raw = resp.content[0].text.strip()
          try:
              data = json.loads(raw)
          except json.JSONDecodeError:
              print("AI returned non-JSON — cannot auto-fix.", file=sys.stderr)
              sys.exit(1)

          fixes = data.get("fixes", {})
          for path_str, content in fixes.items():
              p = pathlib.Path(path_str)
              if str(p).startswith("tcbot/"):
                  p.parent.mkdir(parents=True, exist_ok=True)
                  p.write_text(content)
                  print(f"Fixed: {p}")
          print(f"Crash fix done — {len(fixes)} file(s) patched.")
          PYEOF

      - name: Commit crash fix
        if: always() && env.CRASH_DETECTED == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tcbot/
          git diff --cached --quiet || git commit -m "fix: AI auto-fix crash detected in runner [skip ci]"
          git diff --cached --quiet || git push

      - name: Upload bot log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-log-${{ github.run_id }}
          path: bot.log
          retention-days: 7
