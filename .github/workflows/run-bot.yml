name: TCF Bot — 24/7 Runner

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

concurrency:
  group: tcf-bot-runner
  cancel-in-progress: false

jobs:
  run:
    name: Run bot (3.5 h window)
    runs-on: ubuntu-latest
    timeout-minutes: 240
    permissions:
      contents: write
      models: read

    env:
      BOT_TOKEN:      ${{ secrets.BOT_TOKEN }}
      MONGODB_URI:    ${{ secrets.MONGODB_URI }}
      DB_NAME:        ${{ secrets.DB_NAME }}
      COMMUNITY_NAME: ${{ secrets.COMMUNITY_NAME }}
      OWNER_ID:       ${{ secrets.OWNER_ID }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # -----------------------------------------------------------------------
      # AI PRE-FLIGHT — reads agents/ + full source, understands project,
      # spots obvious issues and patches them before the bot starts.
      # Uses GitHub Models (free, GITHUB_TOKEN — no external API key needed).
      # -----------------------------------------------------------------------
      - name: AI pre-flight check
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python - << 'PYEOF'
          import json, os, pathlib, sys, urllib.request

          SKIP = {".git", "__pycache__", ".pythonlibs", ".local", ".pytest_cache"}
          MAX_FILE_CHARS  = 3_000   # truncate individual files larger than this
          MAX_TOTAL_CHARS = 60_000  # hard cap on total context sent to AI

          def read_project(roots: list[str], exts=(".py", ".md", ".toml")) -> dict[str, str]:
              out: dict[str, str] = {}
              for root in roots:
                  for p in pathlib.Path(root).rglob("*"):
                      if not p.is_file() or p.suffix not in exts:
                          continue
                      if any(s in p.parts for s in SKIP):
                          continue
                      try:
                          text = p.read_text(errors="replace")
                          if len(text) > MAX_FILE_CHARS:
                              text = text[:MAX_FILE_CHARS] + "\n... [truncated]"
                          out[str(p)] = text
                      except OSError:
                          pass
              return out

          def build_ctx(files: dict[str, str]) -> str:
              parts = []
              total = 0
              for k, v in sorted(files.items()):
                  chunk = f"=== {k} ===\n{v}"
                  if total + len(chunk) > MAX_TOTAL_CHARS:
                      break
                  parts.append(chunk)
                  total += len(chunk)
              return "\n\n".join(parts)

          def ask_ai(system: str, user: str) -> str:
              token = os.environ["GITHUB_TOKEN"]
              payload = json.dumps({
                  "model": "gpt-4o-mini",
                  "messages": [
                      {"role": "system", "content": system},
                      {"role": "user",   "content": user},
                  ],
                  "max_tokens": 8192,
                  "temperature": 0.1,
              }).encode()
              req = urllib.request.Request(
                  "https://models.inference.ai.azure.com/chat/completions",
                  data=payload,
                  headers={
                      "Content-Type": "application/json",
                      "Authorization": f"Bearer {token}",
                  },
              )
              with urllib.request.urlopen(req, timeout=120) as resp:
                  return json.loads(resp.read())["choices"][0]["message"]["content"]

          project = read_project(["agents", "tcbot", "tests", "pyproject.toml"])
          ctx     = build_ctx(project)

          SYSTEM = """
          You are a senior Python engineer doing a pre-flight check on TCF Bot.
          TCF Bot is a Telegram federation moderation bot:
          - Runtime: Python 3.11, python-telegram-bot 22.5 (async), Motor (MongoDB), Flask keepalive
          - Main package: tcbot/ — architecture and strict rules are in agents/
          - Entry point: python -m tcbot

          Read EVERY file provided. Then:
          1. Confirm you understand the architecture.
          2. List any bugs, broken imports, or rule violations (agents/RULES.md, agents/STYLE-CODE.md).
          3. Return ONLY valid JSON — no prose, no markdown fences:
             {"understood": true, "fixes": {"relative/path.py": "full corrected file content"}}
          If there is nothing to fix: {"understood": true, "fixes": {}}
          Only include files that genuinely need changing. Safety rule: only patch tcbot/ files.
          """.strip()

          USER = (
              "Read this entire project. The agents/ folder contains architecture docs and "
              "strict coding rules — they are authoritative. tcbot/ is the main package. "
              "After understanding everything, return the JSON fix map.\n\n" + ctx
          )

          raw = ask_ai(SYSTEM, USER)
          if raw.startswith("```"):
              raw = "\n".join(raw.split("\n")[1:]).rsplit("```", 1)[0].strip()

          try:
              data = json.loads(raw)
          except json.JSONDecodeError as exc:
              print(f"AI returned non-JSON ({exc}) — skipping pre-flight fixes.", file=sys.stderr)
              sys.exit(0)

          fixes: dict[str, str] = data.get("fixes", {})
          patched = 0
          for path_str, content in fixes.items():
              p = pathlib.Path(path_str)
              if not str(p).startswith("tcbot/"):
                  print(f"Skipped (safety): {p}", file=sys.stderr)
                  continue
              if not p.exists():
                  print(f"Skipped (new file not allowed in pre-flight): {p}", file=sys.stderr)
                  continue
              p.write_text(content)
              print(f"Pre-flight patched: {p}")
              patched += 1

          print(f"Pre-flight complete — {patched} fix(es) applied.")
          print(f"AI understood project: {data.get('understood', False)}")
          PYEOF

      - name: Commit pre-flight fixes (if any)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tcbot/
          git diff --cached --quiet \
            || git commit -m "fix: AI pre-flight patch before run [skip ci]"
          git push 2>/dev/null || true

      # -----------------------------------------------------------------------
      # BOT RUN — 3.5 hours in background, log to file
      # -----------------------------------------------------------------------
      - name: Start bot (3.5 h)
        run: |
          python -m tcbot > bot.log 2>&1 &
          BOT_PID=$!
          echo "BOT_PID=$BOT_PID" >> "$GITHUB_ENV"
          sleep 12600
          kill "$BOT_PID" 2>/dev/null || true
          wait "$BOT_PID" 2>/dev/null || true

      # -----------------------------------------------------------------------
      # CRASH DETECTION
      # -----------------------------------------------------------------------
      - name: Detect crash
        if: always()
        run: |
          if [[ -f bot.log ]] && grep -qiE "(Traceback|^\w+Error:|CRITICAL)" bot.log; then
            echo "CRASH=true" >> "$GITHUB_ENV"
            grep -n "" bot.log | tail -120 > crash_tail.log
            echo "Crash detected — last 120 lines saved."
          else
            echo "CRASH=false" >> "$GITHUB_ENV"
          fi

      # -----------------------------------------------------------------------
      # AI CRASH FIX — only runs when crash is detected
      # -----------------------------------------------------------------------
      - name: AI crash analysis and auto-fix
        if: always() && env.CRASH == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python - << 'PYEOF'
          import json, os, pathlib, sys, urllib.request

          SKIP = {".git", "__pycache__", ".pythonlibs", ".local"}
          MAX_FILE_CHARS  = 3_000
          MAX_TOTAL_CHARS = 60_000

          def read_project(roots, exts=(".py", ".md", ".toml")):
              out = {}
              for root in roots:
                  for p in pathlib.Path(root).rglob("*"):
                      if not p.is_file() or p.suffix not in exts:
                          continue
                      if any(s in p.parts for s in SKIP):
                          continue
                      try:
                          text = p.read_text(errors="replace")
                          if len(text) > MAX_FILE_CHARS:
                              text = text[:MAX_FILE_CHARS] + "\n... [truncated]"
                          out[str(p)] = text
                      except OSError:
                          pass
              return out

          def build_ctx(files: dict) -> str:
              parts = []
              total = 0
              for k, v in sorted(files.items()):
                  chunk = f"=== {k} ===\n{v}"
                  if total + len(chunk) > MAX_TOTAL_CHARS:
                      break
                  parts.append(chunk)
                  total += len(chunk)
              return "\n\n".join(parts)

          def ask_ai(system: str, user: str) -> str:
              token = os.environ["GITHUB_TOKEN"]
              payload = json.dumps({
                  "model": "gpt-4o-mini",
                  "messages": [
                      {"role": "system", "content": system},
                      {"role": "user",   "content": user},
                  ],
                  "max_tokens": 8192,
                  "temperature": 0.05,
              }).encode()
              req = urllib.request.Request(
                  "https://models.inference.ai.azure.com/chat/completions",
                  data=payload,
                  headers={
                      "Content-Type": "application/json",
                      "Authorization": f"Bearer {token}",
                  },
              )
              with urllib.request.urlopen(req, timeout=120) as resp:
                  return json.loads(resp.read())["choices"][0]["message"]["content"]

          crash_log = pathlib.Path("crash_tail.log").read_text(errors="replace")
          project   = read_project(["agents", "tcbot"])
          ctx       = build_ctx(project)

          SYSTEM = """
          You are a senior Python engineer fixing a crashed Telegram bot in CI.
          Bot: TCF Bot (python-telegram-bot 22.5, Motor/MongoDB, Python 3.11).
          Architecture docs and rules are in agents/ — follow them exactly.
          Main package: tcbot/. Entry: python -m tcbot.

          You will receive a crash log and full source. Your job:
          1. Identify the root cause precisely.
          2. Fix it minimally — do not refactor unrelated code.
          3. Follow agents/RULES.md, STYLE-CODE.md, STYLE-COMMENTS.md strictly.

          Return ONLY valid JSON — no prose, no fences:
          {"root_cause": "one sentence", "fixes": {"relative/path.py": "full corrected content"}}
          Only patch files in tcbot/.
          """.strip()

          USER = (
              f"=== CRASH LOG (last 120 lines) ===\n{crash_log}\n\n"
              f"=== PROJECT SOURCE ===\n{ctx}"
          )

          raw = ask_ai(SYSTEM, USER)
          if raw.startswith("```"):
              raw = "\n".join(raw.split("\n")[1:]).rsplit("```", 1)[0].strip()

          try:
              data = json.loads(raw)
          except json.JSONDecodeError as exc:
              print(f"AI crash fix returned non-JSON ({exc}).", file=sys.stderr)
              sys.exit(1)

          print(f"Root cause identified: {data.get('root_cause', '(unknown)')}")
          fixes = data.get("fixes", {})
          patched = 0
          for path_str, content in fixes.items():
              p = pathlib.Path(path_str)
              if not str(p).startswith("tcbot/"):
                  continue
              p.parent.mkdir(parents=True, exist_ok=True)
              p.write_text(content)
              print(f"Fixed: {p}")
              patched += 1
          print(f"Crash fix done — {patched} file(s) patched.")
          PYEOF

      - name: Commit crash fix
        if: always() && env.CRASH == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tcbot/
          git diff --cached --quiet \
            || git commit -m "fix: AI auto-fix — crash detected during run [skip ci]"
          git push 2>/dev/null || true

      - name: Upload bot log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-log-${{ github.run_id }}
          path: |
            bot.log
            crash_tail.log
          retention-days: 7
