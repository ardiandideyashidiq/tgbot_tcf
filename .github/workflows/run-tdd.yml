name: TDD — Multi-Python Matrix

on:
  push:
    branches: [main, "feat/**", "fix/**", "refactor/**"]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * 1"    # every Monday 03:00 UTC — full latest-package sweep
  workflow_dispatch:
    inputs:
      python_versions:
        description: "Python versions to test (comma-separated, e.g: 3.11,3.12,3.13,3.14,3.15)"
        required: false
        default: "3.11,3.12,3.13,3.14,3.15"
        type: string
      use_latest_packages:
        description: "Upgrade all packages to latest? (uncheck = use pinned requirements.txt)"
        required: false
        default: true
        type: boolean

concurrency:
  group: tdd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Setup: parse python_versions input into a JSON matrix
  # ---------------------------------------------------------------------------
  setup:
    name: Build matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          VERSIONS="${{ inputs.python_versions || '3.11,3.12,3.13' }}"
          JSON=$(python3 -c "
          import json
          versions = [v.strip() for v in '$VERSIONS'.split(',') if v.strip()]
          print(json.dumps({'python-version': versions}))
          ")
          echo "matrix=$JSON" >> "$GITHUB_OUTPUT"
          echo "Matrix: $JSON"

  # ---------------------------------------------------------------------------
  # Matrix: run tests across selected Python versions
  # ---------------------------------------------------------------------------
  pytest:
    name: pytest / Python ${{ matrix.python-version }}
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    services:
      mongodb:
        image: mongo:8.0
        ports:
          - 27017:27017

    outputs:
      any_failure: ${{ steps.result.outputs.any_failure }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install packages
        run: |
          python -m pip install --upgrade pip setuptools wheel
          if [[ "${{ inputs.use_latest_packages }}" == "false" ]]; then
            echo "Using pinned packages from requirements.txt"
            pip install -r requirements.txt
            pip install pytest pytest-asyncio
          else
            echo "Upgrading all packages to latest"
            pip install --upgrade \
              "python-telegram-bot[job-queue]" \
              motor \
              flask \
              python-dotenv \
              pytest \
              pytest-asyncio
          fi
          pip install -e . --no-deps 2>/dev/null || true

      - name: Run test suite
        id: run_tests
        env:
          BOT_TOKEN:      "test:token"
          MONGODB_URI:    "mongodb://localhost:27017"
          DB_NAME:        "tcbot_test"
          COMMUNITY_NAME: "TCF"
          OWNER_ID:       "123456"
          LOGS:           "-1001000000001"
          PROOFS:         "-1001000000002"
          APPEALS:        "-1001000000003"
        run: |
          mkdir -p results
          python -m pytest tests/ \
            --tb=short \
            --junit-xml=results/junit-py${{ matrix.python-version }}.xml \
            -q 2>&1 | tee results/pytest-py${{ matrix.python-version }}.log
          echo "EXIT=${PIPESTATUS[0]}" >> "$GITHUB_ENV"
        continue-on-error: true

      - id: result
        run: |
          if [[ "$EXIT" != "0" ]]; then
            echo "any_failure=true" >> "$GITHUB_OUTPUT"
          else
            echo "any_failure=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tdd-results-py${{ matrix.python-version }}
          path: results/
          retention-days: 14

      - name: Fail if tests failed
        if: env.EXIT != '0'
        run: exit 1
