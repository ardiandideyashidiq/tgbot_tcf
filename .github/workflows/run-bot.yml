name: TCF Bot — 24/7 Runner

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

concurrency:
  group: tcf-bot-runner
  cancel-in-progress: false

jobs:
  run:
    name: Run bot (3.5 h window)
    runs-on: ubuntu-latest
    timeout-minutes: 240
    permissions:
      contents: write

    env:
      BOT_TOKEN:      ${{ secrets.BOT_TOKEN }}
      MONGODB_URI:    ${{ secrets.MONGODB_URI }}
      DB_NAME:        ${{ secrets.DB_NAME }}
      COMMUNITY_NAME: ${{ secrets.COMMUNITY_NAME }}
      OWNER_ID:       ${{ secrets.OWNER_ID }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start bot (3.5 h)
        run: |
          python -m tcbot > bot.log 2>&1 &
          BOT_PID=$!
          echo "BOT_PID=$BOT_PID" >> "$GITHUB_ENV"
          sleep 12600
          kill "$BOT_PID" 2>/dev/null || true
          wait "$BOT_PID" 2>/dev/null || true

      - name: Detect crash
        if: always()
        run: |
          if [[ -f bot.log ]] && grep -qiE "(Traceback|^\w+Error:|CRITICAL)" bot.log; then
            echo "CRASH=true" >> "$GITHUB_ENV"
            grep -n "" bot.log | tail -120 > crash_tail.log
            echo "Crash detected — last 120 lines saved."
          else
            echo "CRASH=false" >> "$GITHUB_ENV"
          fi

      - name: Upload bot log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-log-${{ github.run_id }}
          path: |
            bot.log
            crash_tail.log
          retention-days: 7
