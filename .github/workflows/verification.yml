name: TDD — Verification Report

on:
  workflow_run:
    workflows: ["TDD — Multi-Python Matrix"]
    types: [completed]
  workflow_dispatch:

jobs:
  report:
    name: Parse results & report
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
      actions: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install junitparser
        run: pip install junitparser

      # Download artifacts from the triggering workflow run (or current run)
      - name: Download test artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p artifacts
          # Try to get artifacts from the triggering workflow_run
          RUN_ID="${{ github.event.workflow_run.id }}"
          if [[ -z "$RUN_ID" ]]; then
            RUN_ID="${{ github.run_id }}"
          fi
          gh run download "$RUN_ID" --dir artifacts/ 2>/dev/null || true
          echo "Artifacts downloaded:"
          find artifacts/ -type f | sort || echo "(none found)"

      - name: Parse results and write GitHub summary
        id: parse
        run: |
          python - << 'PYEOF'
          import os, pathlib, sys
          from junitparser import JUnitXml

          artifact_dir = pathlib.Path("artifacts")
          xml_files    = sorted(artifact_dir.rglob("*.xml"))

          if not xml_files:
              msg = (
                  "## TCF Bot — TDD Verification\n\n"
                  "> No test result artifacts were found in the downloaded TDD workflow artifacts. "
                  "This verification run requires the TDD workflow to complete successfully and publish JUnit XML results.\n\n"
                  "If this was unexpected, confirm the TDD workflow generated artifacts and that the workflow artifacts were available for download."
              )
              pathlib.Path(os.environ["GITHUB_STEP_SUMMARY"]).write_text(msg)
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("any_failure=false\n")
                  f.write("total_passed=0\n")
                  f.write("total_failed=0\n")
                  f.write("total_skipped=0\n")
              print("No artifacts — writing empty summary.")
              sys.exit(0)

          rows:         list[str] = []
          total_passed  = 0
          total_failed  = 0
          total_skipped = 0
          any_failure   = False
          failed_cases  = []
          errored_cases = []
          skipped_cases = []

          for xml_path in xml_files:
              try:
                  suites = JUnitXml.fromfile(str(xml_path))
              except Exception as exc:
                  rows.append(f"| `{xml_path.stem}` | ERROR | — | — | — |")
                  any_failure = True
                  continue

              for s in suites:
                  passed  = max(0, s.tests - s.failures - s.errors - s.skipped)
                  failed  = s.failures + s.errors
                  skipped = s.skipped
                  status  = "PASS" if failed == 0 else "FAIL"
                  icon    = "" if status == "PASS" else ""
                  label   = xml_path.parent.name.replace("tdd-results-", "")
                  rows.append(
                      f"| `{label}` | {icon} {status} | {passed} | {failed} | {skipped} |"
                  )
                  total_passed  += passed
                  total_failed  += failed
                  total_skipped += skipped
                  if failed:
                      any_failure = True

                  for case in s:
                      case_name = f"{case.classname or xml_path.stem}.{case.name}"
                      skipped_flag = getattr(case, "is_skipped", None)
                      if callable(skipped_flag):
                          skipped_flag = skipped_flag()
                      if skipped_flag:
                          skipped_cases.append(case_name)
                          continue
                      result = (case.result or [None])[0]
                      if result is None:
                          continue
                      result_tag = getattr(result, "tag", "failure")
                      message = (getattr(result, "message", "") or "").strip().splitlines()[0]
                      reason = message or result_tag
                      if result_tag == "failure":
                          failed_cases.append((case_name, reason))
                      else:
                          errored_cases.append((case_name, reason))

          detail_lines = [
              "## Failure categories",
              "",
              f"- Assertion failures: {len(failed_cases)}",
              f"- Exceptions / runtime errors: {len(errored_cases)}",
              f"- Skipped tests: {len(skipped_cases)}",
              f"- Test result artifacts processed: {len(xml_files)}",
              "",
              "## Failure details",
              "",
          ]

          if failed_cases or errored_cases:
              for case_name, reason in (failed_cases + errored_cases)[:50]:
                  severity = "FAIL" if (case_name, reason) in failed_cases else "ERROR"
                  detail_lines.append(f"- `{case_name}` — {severity}: {reason}")
              remaining = len(failed_cases) + len(errored_cases) - 50
              if remaining > 0:
                  detail_lines.append(f"- ...and {remaining} more failing tests not shown here.")
          else:
              detail_lines.append(
                  "- No individual failing test cases were extracted from the JUnit artifacts. "
                  "This usually means the failure occurred during test discovery, import/setup, or the artifacts are incomplete."
              )

          detail_lines.extend([
              "",
              "## Recommended diagnostics",
              "",
              "- Open the workflow run and review the full pytest output for the first failing assertion or exception.",
              "- Download the artifacts and inspect the associated XML/log files for detailed traceback text.",
              "- Start debugging from the earliest listed failure, as later failures are often caused by the same issue.",
              "- If no individual failure is visible, look for environment/setup problems such as missing imports, broken dependencies, or Python version incompatibility.",
          ])

          summary = "\n".join([
              "## TCF Bot — TDD Verification",
              "",
              "This report aggregates the JUnit test artifacts generated by the TDD workflow and summarizes pass/fail/skipped counts for each artifact set.",
              "",
              f"| Metric | Value |",
              f"|--------|-------|",
              f"| Total passed  | **{total_passed}** |",
              f"| Total failed  | **{total_failed}** |",
              f"| Total skipped | {total_skipped} |",
              f"| Artifact files processed | {len(xml_files)} |",
              "",
              "| Test artifact set | Status | Passed | Failed | Skipped |",
              "|------------------|--------|--------|--------|---------|",
              *rows,
              "",
              "**All checks passed.**" if not any_failure else "**Some checks FAILED.**",
              "",
              "> For failing runs, review the workflow artifacts and the detailed failure section below to identify the first failing assertion, exception, or environment issue.",
          ])

          pathlib.Path(os.environ["GITHUB_STEP_SUMMARY"]).write_text(summary)
          pathlib.Path("failure_body.txt").write_text("\n".join(detail_lines))
          print(summary)

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"any_failure={'true' if any_failure else 'false'}\n")
              f.write(f"total_passed={total_passed}\n")
              f.write(f"total_failed={total_failed}\n")
              f.write(f"total_skipped={total_skipped}\n")
          PYEOF

      # -----------------------------------------------------------------------
      # Open a GitHub Issue when tests fail (idempotent — one issue per run)
      # -----------------------------------------------------------------------
      - name: Open GitHub issue on failure
        if: steps.parse.outputs.any_failure == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          SHORT="${SHA:0:7}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          cat > issue_body.txt <<EOF
          Test suite failed on \`${SHORT}\`.

          ## Overview
          - Total passed: **${{ steps.parse.outputs.total_passed }}**
          - Total failed: **${{ steps.parse.outputs.total_failed }}**
          - Total skipped: **${{ steps.parse.outputs.total_skipped }}**
          - Workflow run: ${RUN_URL}
          - Verification checks: the summary report and top failing cases are attached below.

          $(cat failure_body.txt)

          ## Notes
          - The full pytest output and JUnit artifacts are available in the workflow run artifacts.
          - Start troubleshooting from the first failing assertion or exception listed above.
          - If no failing cases are extracted, verify the TDD workflow generated artifacts successfully and that the artifact download step completed.
          EOF

          gh issue create \
            --title "TDD failure on ${SHORT}" \
            --body-file issue_body.txt \
            --label "bug" \
          2>/dev/null || echo "Issue creation skipped (no label or permission issue — check repo settings)"

      # -----------------------------------------------------------------------
      # Telegram notification — uses the existing bot token, no extra cost
      # -----------------------------------------------------------------------
      - name: Telegram notification
        if: always()
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          OWNER_ID:  ${{ secrets.OWNER_ID }}
        run: |
          python - << 'PYEOF'
          import json, os, sys, urllib.request

          token    = os.getenv("BOT_TOKEN", "")
          owner_id = os.getenv("OWNER_ID", "")

          if not token or not owner_id or token.startswith("test:"):
              print("Telegram notification skipped — no real token configured.")
              sys.exit(0)

          passed   = "${{ steps.parse.outputs.total_passed }}"
          failed   = "${{ steps.parse.outputs.total_failed }}"
          run_url  = (
              "${{ github.server_url }}/${{ github.repository }}"
              "/actions/runs/${{ github.run_id }}"
          )
          sha      = "${{ github.event.workflow_run.head_sha || github.sha }}"[:7]
          status   = "PASS" if failed == "0" else "FAIL"

          text = (
              f"<b>TCF Bot TDD — {status}</b>\n"
              f"Commit: <code>{sha}</code>\n"
              f"Passed: {passed}  |  Failed: {failed}\n"
              f'<a href="{run_url}">View run</a>'
          )

          payload = json.dumps({
              "chat_id":                  owner_id,
              "text":                     text,
              "parse_mode":              "HTML",
              "disable_web_page_preview": True,
          }).encode()

          req = urllib.request.Request(
              f"https://api.telegram.org/bot{token}/sendMessage",
              data=payload,
              headers={"Content-Type": "application/json"},
          )
          try:
              urllib.request.urlopen(req, timeout=15)
              print("Telegram notification sent.")
          except Exception as exc:
              print(f"Telegram notification failed: {exc}", file=sys.stderr)
          PYEOF
