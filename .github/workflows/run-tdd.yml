name: TDD — Multi-Python Matrix

on:
  push:
    branches: [main, "feat/**", "fix/**", "refactor/**"]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * 1"    # every Monday 03:00 UTC — full latest-package sweep
  workflow_dispatch:
    inputs:
      python_versions:
        description: "Python versions to test (comma-separated, e.g: 3.11,3.12,3.13,3.14)"
        required: false
        default: "3.11,3.12,3.13"
        type: string
      use_latest_packages:
        description: "Upgrade all packages to latest? (uncheck = use pinned requirements.txt)"
        required: false
        default: true
        type: boolean

concurrency:
  group: tdd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Setup: parse python_versions input into a JSON matrix
  # ---------------------------------------------------------------------------
  setup:
    name: Build matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          VERSIONS="${{ inputs.python_versions || '3.11,3.12,3.13' }}"
          JSON=$(python3 -c "
          import json
          versions = [v.strip() for v in '$VERSIONS'.split(',') if v.strip()]
          print(json.dumps({'python-version': versions}))
          ")
          echo "matrix=$JSON" >> "$GITHUB_OUTPUT"
          echo "Matrix: $JSON"

  # ---------------------------------------------------------------------------
  # Matrix: run tests across selected Python versions
  # ---------------------------------------------------------------------------
  pytest:
    name: pytest / Python ${{ matrix.python-version }}
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    services:
      mongodb:
        image: mongo:8.0
        ports:
          - 27017:27017

    outputs:
      any_failure: ${{ steps.result.outputs.any_failure }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install packages
        run: |
          python -m pip install --upgrade pip setuptools wheel
          if [[ "${{ inputs.use_latest_packages }}" == "false" ]]; then
            echo "Using pinned packages from requirements.txt"
            pip install -r requirements.txt
            pip install pytest pytest-asyncio
          else
            echo "Upgrading all packages to latest"
            pip install --upgrade \
              "python-telegram-bot[job-queue]" \
              motor \
              flask \
              python-dotenv \
              pytest \
              pytest-asyncio
          fi
          pip install -e . --no-deps 2>/dev/null || true

      - name: Run test suite
        id: run_tests
        env:
          BOT_TOKEN:      "test:token"
          MONGODB_URI:    "mongodb://localhost:27017"
          DB_NAME:        "tcbot_test"
          COMMUNITY_NAME: "TCF"
          OWNER_ID:       "123456"
          LOGS:           "-1001000000001"
          PROOFS:         "-1001000000002"
          APPEALS:        "-1001000000003"
        run: |
          mkdir -p results
          python -m pytest tests/ \
            --tb=short \
            --junit-xml=results/junit-py${{ matrix.python-version }}.xml \
            -q 2>&1 | tee results/pytest-py${{ matrix.python-version }}.log
          echo "EXIT=${PIPESTATUS[0]}" >> "$GITHUB_ENV"
        continue-on-error: true

      - id: result
        run: |
          if [[ "$EXIT" != "0" ]]; then
            echo "any_failure=true" >> "$GITHUB_OUTPUT"
          else
            echo "any_failure=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tdd-results-py${{ matrix.python-version }}
          path: results/
          retention-days: 14

      - name: Fail if tests failed
        if: env.EXIT != '0'
        run: exit 1

  # ---------------------------------------------------------------------------
  # AI step: fix failures only — no new files created
  # Runs when: any matrix job failed OR weekly schedule sweep
  # ---------------------------------------------------------------------------
  ai-patch:
    name: AI — fix failures & generate new tests
    needs: pytest
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      models: read
    if: >
      always() &&
      (needs.pytest.result == 'failure' || github.event_name == 'schedule')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download all test artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: AI reads project → fixes failures only
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python - << 'PYEOF'
          import json, os, pathlib, sys, textwrap, urllib.request

          SKIP = {".git", "__pycache__", ".pythonlibs", ".local", ".pytest_cache", "artifacts"}
          MAX_FILE_CHARS  = 1_200
          MAX_TOTAL_CHARS = 12_000

          def read_project(roots: list[str], exts=(".py", ".md", ".toml")) -> dict[str, str]:
              out: dict[str, str] = {}
              for root in roots:
                  for p in pathlib.Path(root).rglob("*"):
                      if not p.is_file() or p.suffix not in exts:
                          continue
                      if any(s in p.parts for s in SKIP):
                          continue
                      try:
                          text = p.read_text(errors="replace")
                          if len(text) > MAX_FILE_CHARS:
                              text = text[:MAX_FILE_CHARS] + "\n... [truncated]"
                          out[str(p)] = text
                      except OSError:
                          pass
              return out

          def build_ctx(files: dict[str, str]) -> str:
              parts = []
              total = 0
              for k, v in sorted(files.items()):
                  chunk = f"--- {k} ---\n{v}"
                  if total + len(chunk) > MAX_TOTAL_CHARS:
                      break
                  parts.append(chunk)
                  total += len(chunk)
              return "\n\n".join(parts)

          def read_artifacts() -> str:
              parts = [
                  f"=== {p.name} ===\n{p.read_text(errors='replace')[:2000]}"
                  for p in sorted(pathlib.Path("artifacts").rglob("*.log"))
              ]
              return "\n\n".join(parts) if parts else "(no failure logs — weekly sweep)"

          def ask_ai(system: str, user: str) -> str:
              token = os.environ["GITHUB_TOKEN"]
              payload = json.dumps({
                  "model": "gpt-4o-mini",
                  "messages": [
                      {"role": "system", "content": system},
                      {"role": "user",   "content": user},
                  ],
                  "max_tokens": 2048,
                  "temperature": 0.1,
              }).encode()
              req = urllib.request.Request(
                  "https://models.inference.ai.azure.com/chat/completions",
                  data=payload,
                  headers={
                      "Content-Type": "application/json",
                      "Authorization": f"Bearer {token}",
                  },
              )
              with urllib.request.urlopen(req, timeout=120) as resp:
                  return json.loads(resp.read())["choices"][0]["message"]["content"]

          project  = read_project(["agents", "tcbot", "tests", "pyproject.toml"])
          ctx      = build_ctx(project)
          failures = read_artifacts()

          SYSTEM = textwrap.dedent("""
              You are a senior Python engineer embedded in a CI pipeline for TCF Bot.
              Stack: Python 3.11+, python-telegram-bot 22.5 (async), Motor (MongoDB), Flask.
              Main package: tcbot/. Architecture and strict coding rules: agents/.
              Tests live in tests/.

              Your ONLY task: fix failing tests shown in the failure logs.
              - If the bug is in the test file, fix the test.
              - If the bug is in the source code, fix the source.
              - Follow agents/STYLE-CODE.md and agents/STYLE-COMMENTS.md exactly.
              - NEVER create new files. ONLY modify files that already exist.
              - NEVER add new test functions unrelated to the failures.

              Return ONLY valid JSON — no prose, no markdown fences:
              {
                "summary": "one-sentence summary of what you fixed",
                "fixes": {
                  "tests/test_existing.py": "full corrected file content",
                  "tcbot/some_module.py": "corrected source only if bug is in source"
                }
              }
              If nothing needs fixing: {"summary": "no issues found", "fixes": {}}

              Safety rules:
              - Only patch files in tests/ or tcbot/ that ALREADY EXIST
              - Do not create new files
              - Do not delete existing test functions
              - Do not touch .github/workflows/*, config.env
          """).strip()

          USER = (
              "Fix only the failing tests shown in the logs. "
              "Do NOT create new files — only patch files that already exist.\n\n"
              f"=== PROJECT FILES ===\n{ctx}\n\n"
              f"=== PYTEST FAILURE LOGS ===\n{failures}"
          )

          raw = ask_ai(SYSTEM, USER)
          if raw.startswith("```"):
              raw = "\n".join(raw.split("\n")[1:]).rsplit("```", 1)[0].strip()

          try:
              data = json.loads(raw)
          except json.JSONDecodeError as exc:
              print(f"AI returned invalid JSON ({exc}).", file=sys.stderr)
              print(raw[:300], file=sys.stderr)
              sys.exit(1)

          print(f"AI summary: {data.get('summary', '(none)')}")
          written = 0
          for path_str, content in data.get("fixes", {}).items():
              p = pathlib.Path(path_str)
              if not (str(p).startswith("tests/") or str(p).startswith("tcbot/")):
                  print(f"Skipped (outside allowed dirs): {p}", file=sys.stderr)
                  continue
              if not p.exists():
                  print(f"Skipped (new file not allowed): {p}", file=sys.stderr)
                  continue
              p.write_text(content)
              print(f"Fixed: {p}")
              written += 1

          print(f"AI patch complete — {written} file(s) patched.")
          PYEOF

      - name: Commit AI patches
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/ tcbot/
          git diff --cached --quiet \
            || git commit -m "fix(tdd): AI patch — fix test failures [skip ci]"
          git push 2>/dev/null || true
